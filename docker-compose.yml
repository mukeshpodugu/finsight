version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: finsight-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finsight_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - finsight-network

  redis:
    image: redis:7.2-alpine
    container_name: finsight-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finsight-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=finsight_db
      - DB_USER=root
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock-key}
    depends_on:
      - db
      - redis
    networks:
      - finsight-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - finsight-network

networks:
  finsight-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
